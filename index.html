<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unemployment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="config-section">
    <h2 class="section-title">Configuration</h2>

    <div id="timeline-chart-container"></div>

    <div id="config-body">
        <div id="legend-container"></div>

        <div id="config-charts">
            <div id="choropleth-container"></div>

            <div id="gender-bar-chart-container"></div>
            <div id="nationality-bar-chart-container"></div>

            <div class="treemap-card">
                <button id="zoom-out">Hierarchy up</button>
                <div id="treemap-container"></div>
            </div>

            <div id="job-list-container"></div>
        </div>
    </div>
</section>

<section class="analysis-section">
    <h2 class="section-title">Analysis</h2>
    <div class="no-data">No Data</div>

    <div class="default-row">
        <div id="line-chart-container"></div>
        <div id="gender-donut-container"></div>
        <div id="nationality-donut-container"></div>
    </div>
</section>

<script type="module" src="main.js"></script>
</body>
</html>
